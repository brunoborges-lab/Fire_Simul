name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Correção crucial: Configurar o Java Corretamente antes de tudo
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev bzip2 webp

    - name: Install Pip Dependencies
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer kivy

   - name: Build APK with Buildozer
      run: |
        buildozer -v android debug
      env:
        # Forma oficial e segura de aceitar os termos sem usar o comando 'yes'
        APP_ANDROID_ACCEPT_SDK_LICENSE: "True"
        GRADLE_OPTS: "-Dorg.gradle.daemon=false"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: package-apk
        path: bin/*.apk
